server {
    listen 80 default_server;
    server_name _ baby-monitor.yschan.com localhost;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name baby-monitor.yschan.com;

    ssl_certificate /etc/letsencrypt/live/baby-monitor.yschan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/baby-monitor.yschan.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://backend-api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}