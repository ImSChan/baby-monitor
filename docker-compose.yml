services:
  nginx:
    image: nginx:1.27-alpine
    container_name: baby-monitor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/certbot/conf:/etc/letsencrypt
    depends_on:
      - backend-api

  certbot:
    image: certbot/certbot
    container_name: baby-monitor-certbot
    volumes:
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/certbot/conf:/etc/letsencrypt

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baby-monitor-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - ./backend/models:/app/models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baby-monitor-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - ./backend/models:/app/models
    command: python -m app.workers.analysis_worker

  db:
    image: postgres:16
    container_name: baby-monitor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: baby_monitor
      POSTGRES_USER: baby_user
      POSTGRES_PASSWORD: baby_password
    volumes:
      - baby_monitor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baby_user -d baby_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: baby-monitor-redis
    restart: unless-stopped
    expose:
      - "6379"

volumes:
  baby_monitor_postgres_data: