services:
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baby-monitor-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/app:/app/app
      - ./backend/models:/app/models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baby-monitor-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/app:/app/app
      - ./backend/models:/app/models
    command: python -m app.workers.analysis_worker

  db:
    image: postgres:16
    container_name: baby-monitor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: baby_monitor
      POSTGRES_USER: baby_user
      POSTGRES_PASSWORD: baby_password
    ports:
      - "5432:5432"
    volumes:
      - baby_monitor_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: baby-monitor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  baby_monitor_postgres_data:
